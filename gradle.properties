# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Force Gradle to ignore the incomplete JRE found in the VS Code extension directory.
# Force Gradle to detect locally installed JDKs
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=false

# Prevent Gradle from using the environment's JAVA_HOME if it points to a JRE.
org.gradle.java.installations.fromEnv=
