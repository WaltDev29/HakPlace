<!DOCTYPE html>

<html class="light" lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Hakplace - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "outline-variant": "#bfcaba",
            "surface-container": "#eeeeee",
            "surface-container-lowest": "#ffffff",
            "rating-star": "#facc15",
            "primary-container": "#2e7d32",
            "surface-container-low": "#f3f3f3",
            "on-primary-container": "#cbffc2",
            "ai-insight-bg": "rgba(201, 231, 202, 0.3)"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "stack-md": "0.5rem",
            "stack-lg": "1rem",
            "section-gap": "1.5rem",
            "margin-page": "1rem",
            "gutter-card": "0.75rem",
            "stack-sm": "0.25rem"
          },
          "fontFamily": {
            "headline-lg": ["Plus Jakarta Sans"],
            "body-lg": ["Plus Jakarta Sans"],
            "headline-md": ["Plus Jakarta Sans"],
            "body-md": ["Plus Jakarta Sans"],
            "label-sm": ["Plus Jakarta Sans"],
            "chart-label": ["Plus Jakarta Sans"],
            "rating-display": ["Plus Jakarta Sans"],
            "label-lg": ["Plus Jakarta Sans"]
          },
          "fontSize": {
            "headline-lg": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "headline-md": ["18px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
            "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
            "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
            "chart-label": ["10px", { "lineHeight": "12px", "fontWeight": "500" }],
            "rating-display": ["2.25rem", { "lineHeight": "1", "fontWeight": "800" }],
            "label-lg": ["14px", { "lineHeight": "18px", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
      overflow: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .emerald-gradient-bg {
      background: radial-gradient(circle at 100% 0%, rgba(203, 255, 194, 0.4) 0%, rgba(255, 255, 255, 0) 50%),
        radial-gradient(circle at 0% 100%, rgba(46, 125, 50, 0.05) 0%, rgba(255, 255, 255, 0) 40%);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="flex flex-col min-h-screen emerald-gradient-bg">
  <!-- Main Content Canvas -->
  <main class="flex-grow flex flex-col items-center justify-center px-margin-page py-12">
    <!-- Header / Brand Anchor -->
    <header class="flex flex-col items-center mb-section-gap w-full max-w-sm">
      <div
        class="mb-stack-lg p-stack-md rounded-xl bg-surface-container-lowest shadow-sm border border-outline-variant/20">
        <img alt="Hakplace Logo" class="w-16 h-16 object-contain"
          data-alt="A minimalist and modern brand logo for a university food service app. The logo features a stylized emerald green fork and spoon integrated into a shield-like geometric shape. The aesthetic is clean and professional, with a high-key white background and soft lighting that emphasizes precision and health-conscious dining. The style is contemporary corporate with smooth gradients of deep forest green and vibrant emerald."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYtXH2bmaASo7t6LPz9x62rfG2EzAQ3ihonodjBYQ1JbwfCflOA6qOfAcGQAp8E1ZPO6g0JxlfsUL4cvJgWN9aNBwyAeeljVIUGC1PSzvS_VjDEkEiNEqmUlDh9SYGsblgkr5Jk08yQ2WVTtdE4gjWjVc4DAZWfB827LiCSe7BkiZY04Nxoaj5e-GC7s7QIWWg0MFVBkZ5Vuvt_Iv7ewaYGi7vgxm4MG7NnUUJ-u3-TUymVD6LhA97qcd8EG2ttZ5MNHHrOlX32Q" />
      </div>
      <h1 class="font-headline-lg text-headline-lg text-primary-container mb-stack-sm">Hakplace</h1>
      <p class="font-body-md text-body-md text-on-surface-variant/70 text-center">Smart Dining for Campus Life</p>
    </header>
    <!-- Login Form Card -->
    <section
      class="w-full max-w-sm bg-surface-container-lowest p-gutter-card rounded-xl shadow-sm border border-outline-variant/20">
      <form class="space-y-stack-lg">
        <!-- Student ID Input -->
        <div class="space-y-stack-sm">
          <label class="block font-label-lg text-label-lg text-primary-container px-1" for="student-id">학번</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span
                class="material-symbols-outlined text-outline-variant group-focus-within:text-primary-container transition-colors"
                data-icon="badge">badge</span>
            </div>
            <input
              class="block w-full pl-10 pr-3 py-3 bg-surface-container-low border-transparent focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-lg font-body-md text-body-md transition-all"
              id="student-id" placeholder="학번을 입력해주세요" type="text" />
          </div>
        </div>
        <!-- Password Input -->
        <div class="space-y-stack-sm">
          <label class="block font-label-lg text-label-lg text-primary-container px-1" for="password">비밀번호</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span
                class="material-symbols-outlined text-outline-variant group-focus-within:text-primary-container transition-colors"
                data-icon="lock">lock</span>
            </div>
            <input
              class="block w-full pl-10 pr-12 py-3 bg-surface-container-low border-transparent focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-lg font-body-md text-body-md transition-all"
              id="password" placeholder="비밀번호를 입력해주세요" type="password" />
            <button
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline-variant hover:text-primary-container transition-colors"
              type="button">
              <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
            </button>
          </div>
        </div>
        <!-- Actions -->
        <div class="pt-stack-md space-y-stack-lg">
          <button
            class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-xl shadow-sm active:scale-95 transition-all duration-150"
            type="submit">
            로그인
          </button>
          <div class="flex items-center justify-between px-1">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input class="w-4 h-4 rounded border-outline-variant text-primary-container focus:ring-primary-container"
                type="checkbox" />
              <span class="font-label-sm text-label-sm text-on-surface-variant">자동 로그인</span>
            </label>
            <a class="font-label-sm text-label-sm text-on-surface-variant/70 hover:text-primary-container transition-colors"
              href="#">비밀번호 찾기</a>
          </div>
        </div>
      </form>
    </section>
    <!-- Secondary Action -->
    <footer class="mt-section-gap w-full max-w-sm text-center">
      <p class="font-body-md text-body-md text-on-surface-variant mb-stack-md">계정이 없으신가요?</p>
      <button
        class="w-full py-3 border border-primary-container text-primary-container font-label-lg text-label-lg rounded-xl hover:bg-on-primary-container transition-colors active:scale-95 duration-150">
        회원가입
      </button>
    </footer>
    <!-- AI Insight Subtle Accent -->
  </main>
  <!-- Social Login Placeholder Section (Optional but adds to Modern UI) -->
</body>

</html>
